name: Build and Release Confirmament Plugin

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Confirmament/Confirmament.csproj

      - name: Build plugin (Release)
        run: dotnet build Confirmament/Confirmament.csproj --configuration Release --no-restore

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: Confirmament
          path: Confirmament/bin/Release/net8.0/Confirmament.dll

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Confirmament

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Confirmament.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
